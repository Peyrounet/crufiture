<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Fond arrondi — vert très foncé crufiture -->
  <rect width="512" height="512" rx="112" fill="#0f1b0f"/>

  <!-- Soleil / solaire — évaporation -->
  <circle cx="256" cy="138" r="62" fill="#f5c842" opacity=".92"/>
  <circle cx="256" cy="138" r="42" fill="#f5a020"/>
  <!-- Rayons -->
  <line x1="256" y1="60"  x2="256" y2="44"  stroke="#f5c842" stroke-width="10" stroke-linecap="round"/>
  <line x1="256" y1="216" x2="256" y2="232" stroke="#f5c842" stroke-width="10" stroke-linecap="round"/>
  <line x1="178" y1="138" x2="162" y2="138" stroke="#f5c842" stroke-width="10" stroke-linecap="round"/>
  <line x1="334" y1="138" x2="350" y2="138" stroke="#f5c842" stroke-width="10" stroke-linecap="round"/>
  <line x1="201" y1="85"  x2="190" y2="74"  stroke="#f5c842" stroke-width="10" stroke-linecap="round"/>
  <line x1="311" y1="191" x2="322" y2="202" stroke="#f5c842" stroke-width="10" stroke-linecap="round"/>
  <line x1="311" y1="85"  x2="322" y2="74"  stroke="#f5c842" stroke-width="10" stroke-linecap="round"/>
  <line x1="201" y1="191" x2="190" y2="202" stroke="#f5c842" stroke-width="10" stroke-linecap="round"/>

  <!-- Plateau / plaque de production -->
