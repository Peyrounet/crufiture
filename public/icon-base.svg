  <!-- Mélange sur le plateau — forme organique -->
  <ellipse cx="256" cy="276" rx="148" ry="30" fill="#4a9e6a"/>
  <ellipse cx="256" cy="268" rx="128" ry="22" fill="#6dbf5a"/>

  <!-- Gouttes d'évaporation montant -->
  <ellipse cx="190" cy="238" rx="9" ry="13" fill="#7ab8f5" opacity=".7"/>
  <ellipse cx="256" cy="222" rx="9" ry="13" fill="#7ab8f5" opacity=".8"/>
  <ellipse cx="322" cy="238" rx="9" ry="13" fill="#7ab8f5" opacity=".7"/>

  <!-- Jarre en bas à droite -->
  <rect x="330" y="340" width="86" height="110" rx="12" fill="#1a3a1a"/>
  <rect x="322" y="332" width="102" height="22" rx="8" fill="#2a5a2a"/>
  <rect x="338" y="362" width="70" height="6" rx="3" fill="#6dbf5a" opacity=".5"/>
  <rect x="338" y="378" width="70" height="6" rx="3" fill="#6dbf5a" opacity=".3"/>

  <!-- Herbe / sol -->
  <ellipse cx="256" cy="462" rx="170" ry="18" fill="#1a3a1a" opacity=".6"/>
